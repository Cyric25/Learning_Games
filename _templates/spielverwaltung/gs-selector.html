<!-- ── Spielwähler ────────────────────────────────────────────────────
     Erster Screen in der Spiel-HTML-Datei (.screen.active).
     EINHEITLICHER LOOK (verbindlich): css/spielwaehler.css einbinden
     (<link rel="stylesheet" href="../css/spielwaehler.css">) — die Klasse
     "gs-screen" aktiviert das ZENTRIERTE Risiko-Quiz-Layout unabhängig von
     der Spiel-Palette. Siehe CLAUDE.md → Spielverwaltung → Einheitlicher
     Spielwähler-Look. Referenz-Markup: just-one/index.html.
     ERSETZEN:
       "🎮 Spielname"  → Emoji + Spielname
       joinAsStudent() → bleibt (globale Function Declaration)
       createNewGame() → bleibt (globale Function Declaration)
       "admin.html"    → Editor-Link entfernen/anpassen (falls kein Editor)
     ──────────────────────────────────────────────────────────────── -->
<div class="screen active gs-screen" id="game-selector">
  <h1 class="gs-title">🎮 Spielname</h1>
  <p class="gs-subtitle">Spielcode eingeben um beizutreten</p>

  <input type="text" id="gs-code-input" class="gs-code-input" maxlength="4" placeholder="CODE"
    oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
    onkeydown="if(event.key==='Enter')joinAsStudent()">
  <button class="btn-join-student" onclick="joinAsStudent()">Beitreten</button>
  <div class="gs-join-error" id="gs-join-error"></div>

  <div class="gs-teacher">
    <p class="gs-teacher-label">Oder als Lehrkraft:</p>
    <div id="gs-game-list" class="gs-game-list"></div>
    <div class="gs-teacher-buttons">
      <button class="btn-create-game" onclick="createNewGame()">+ Neues Spiel erstellen</button>
      <!-- optional: <a href="admin.html" class="btn-selector-secondary">⚙ Editor</a> -->
    </div>
  </div>

  <div class="gs-footer">
    <a href="../spiele.html">&#8592; Zurück zur Übersicht</a>
    <button class="gs-theme-toggle" onclick="toggleTheme()">🌓 Design</button>
  </div>
</div>
