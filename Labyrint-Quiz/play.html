<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Labyrinth-Quiz – Spieler</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
  <link rel="stylesheet" href="css/labyrinth.css">
  <style>
    /* ── Play-specific layout ─────────────────────────────────── */
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .play-screen { display: none; flex-direction: column; align-items: center; min-height: 100vh; }
    .play-screen.active { display: flex; }

    /* ── Join Screen ──────────────────────────────────────────── */
    #join-screen { justify-content: center; gap: 1.5rem; padding: 2rem; text-align: center; }
    .join-logo { font-size: 4rem; }
    .join-title { font-size: 1.8rem; font-weight: 800; color: var(--text-primary); font-family: inherit; }
    .join-sub { color: var(--text-secondary); font-size: 0.95rem; }
    .join-box { background: var(--bg-card); border: 2px solid var(--border-card); border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem; }
    .join-input { font-size: 2rem; text-align: center; letter-spacing: 0.3em; text-transform: uppercase; border: 2px solid var(--border-card); border-radius: 10px; padding: 0.7rem 1rem; background: var(--bg-primary); color: var(--text-primary); font-family: inherit; width: 100%; box-sizing: border-box; }
    .join-input:focus { outline: none; border-color: var(--accent); }
    .join-error { color: var(--danger, #dc2626); font-size: 0.9rem; min-height: 1.2em; }
    .join-loading { color: var(--text-secondary); font-size: 0.9rem; display: none; }
    .btn-join { background: var(--accent); color: var(--bg-primary); border: none; border-radius: 12px; padding: 1rem 2rem; font-size: 1.2rem; font-weight: 700; font-family: inherit; cursor: pointer; width: 100%; transition: opacity 0.2s; }
    .btn-join:hover { opacity: 0.85; }

    /* ── Team Select Screen ───────────────────────────────────── */
    #team-select-screen { justify-content: center; gap: 1.2rem; padding: 2rem; text-align: center; }
    .ts-title { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
    .ts-sub { color: var(--text-secondary); font-size: 0.9rem; }
    #team-select-list { display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 400px; }
    .team-select-btn { display: flex; align-items: center; gap: 1rem; background: var(--bg-card); border: 2px solid var(--border-card); border-radius: 14px; padding: 1rem 1.4rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: left; width: 100%; font-family: inherit; }
    .team-select-btn:hover { border-color: var(--accent); background: rgba(227,79,32,0.10); }
    .team-select-btn.taken { opacity: 0.45; cursor: not-allowed; }
    .team-select-btn.taken:hover { border-color: var(--border-card); background: var(--bg-card); }
    .ts-emoji { font-size: 2rem; flex-shrink: 0; }
    .ts-name { flex: 1; font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }
    .ts-icon { font-size: 1.5rem; flex-shrink: 0; }
    .ts-taken { font-size: 0.8rem; font-weight: 600; color: var(--danger); margin-left: 0.4rem; }

    /* ── Play Screen – horizontales Layout ───────────────────── */
    #play-screen {
      flex-direction: row;
      align-items: stretch;
      height: 100vh;
      overflow: hidden;
      min-height: unset;
    }

    /* Linke Spalte: Karte */
    .play-canvas-col {
      flex: 1;
      min-width: 0;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #maze-canvas { display: block; }

    /* Rechte Spalte: Steuerung */
    .play-sidebar {
      width: clamp(160px, 24vw, 240px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-left: 1px solid var(--border-card);
      overflow: hidden;
    }

    .play-header {
      display: flex; flex-direction: column; gap: 0.35rem;
      padding: 0.6rem 0.7rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      flex-shrink: 0;
    }
    #my-team-display { padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.88rem; font-weight: 700; color: #fff; align-self: flex-start; }
    #my-sym-bar { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; }
    .my-sym-dot { font-size: 0.9rem; opacity: 0.35; }
    .my-sym-dot.found { opacity: 1; }

    #play-area { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 0.7rem; box-sizing: border-box; overflow-y: auto; }

    /* ── Waiting ──────────────────────────────────────────────── */
    .wait-screen { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; text-align: center; }
    .wait-emoji { font-size: 2.5rem; animation: pulse 2s ease-in-out infinite; }
    .wait-text { font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── My Turn: Roll ────────────────────────────────────────── */
    .turn-screen { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; text-align: center; }
    .turn-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .dice-display { font-size: clamp(3rem, 12vw, 5rem); line-height: 1; cursor: pointer; user-select: none; transition: transform 0.1s; }
    .dice-display.rolling { animation: diceShake 0.08s infinite alternate; }
    @keyframes diceShake { 0%{transform:rotate(-8deg) scale(0.93)} 100%{transform:rotate(8deg) scale(1.07)} }
    .btn-roll { font-size: 1rem; padding: 0.7rem 1.5rem; }

    /* ── My Turn: Move ────────────────────────────────────────── */
    .move-screen { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
    .steps-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .dice-val { font-size: 1.8rem; }
    .steps-left { font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; }
    .dir-grid { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .dir-row { display: flex; align-items: center; gap: 0.3rem; }
    .dir-center { font-size: 1.5rem; width: 48px; text-align: center; }
    .dir-btn { width: clamp(44px, 11vw, 56px); height: clamp(44px, 11vw, 56px); border-radius: 10px; border: 2px solid var(--border-card); background: var(--bg-card); color: var(--text-primary); font-size: 1.3rem; cursor: pointer; transition: all 0.15s; font-family: inherit; display: flex; align-items: center; justify-content: center; }
    .dir-btn:not(:disabled):hover { background: rgba(227,79,32,0.12); border-color: var(--accent); }
    .dir-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .dir-btn.dir-free { border-color: rgba(227,79,32,0.40); }
    .dir-btn.dir-door { border-color: #dc2626; background: rgba(220,38,38,0.1); }
    .dir-btn.dir-sym { border-color: #7c3aed; background: rgba(124,58,237,0.12); }
    .btn-skip { background: transparent; border: 1px solid var(--border-card); color: var(--text-secondary); font-size: 0.82rem; padding: 0.5rem 1rem; }

    /* ── Generic action button ────────────────────────────────── */
    .btn-action { background: var(--accent); color: var(--bg-primary); border: none; border-radius: 10px; padding: 0.7rem 1.5rem; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.85; }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Finished ─────────────────────────────────────────────── */
    .finished-screen { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; text-align: center; padding: 0.6rem; width: 100%; }
    .finished-trophy { font-size: 3rem; }
    .finished-title { font-size: 1.1rem; font-weight: 800; color: var(--text-primary); }
    .finished-my-score { font-size: 0.82rem; color: var(--text-secondary); }
    .finished-ranking { display: flex; flex-direction: column; gap: 0.3rem; width: 100%; }
    .rank-row { padding: 0.35rem 0.6rem; border-radius: 6px; background: rgba(255,255,255,0.06); font-size: 0.82rem; color: var(--text-primary); text-align: left; }
    .rank-row.rank-me { background: rgba(227,79,32,0.12); border: 1px solid var(--accent); font-weight: 700; }

    /* ── Spectator Question View ─────────────────────────────── */
    .spec-q-screen { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; text-align: center; padding: 0.5rem; width: 100%; }
    .spec-q-team { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); }
    .spec-q-context { font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px; background: rgba(220,38,38,0.12); color: #dc2626; }
    .spec-q-text { font-size: 0.9rem; font-weight: 600; line-height: 1.45; color: var(--text-primary); background: var(--bg-primary); border: 1px solid var(--border-card); border-radius: 10px; padding: 0.7rem 0.8rem; width: 100%; box-sizing: border-box; }
    .spec-q-wait { color: var(--text-secondary); font-style: italic; font-size: 0.8rem; }
    .spec-q-result { font-size: 1rem; font-weight: 700; padding: 0.5rem 1rem; border-radius: 8px; }
    .spec-correct { background: rgba(22,163,74,0.15); color: #16a34a; }
    .spec-wrong { background: rgba(220,38,38,0.15); color: #dc2626; }

    /* ── Handy-Ansicht: Karte oben, Steuerung unten ─────────── */
    @media (max-width: 640px) {
      /* svh = Small Viewport Height = sichtbare Höhe inkl. Browser-Chrome.
         vh allein wäre auf iOS zu groß → Sidebar verschwindet unten. */
      #play-screen {
        flex-direction: column;
        align-items: stretch;
        height: 100vh;   /* Fallback für alte Browser */
        height: 100svh;  /* Immer exakt die sichtbare Fläche */
        overflow: hidden;
      }
      /* Karte: restlicher Platz oberhalb der Steuerung */
      .play-canvas-col {
        flex: 1 1 0;
        min-height: 0;
        width: 100%;
      }
      /* Steuerung: 1/3 der sichtbaren Höhe, immer sichtbar */
      .play-sidebar {
        flex: none;
        width: 100%;
        height: 33vh;
        height: 33svh;
        max-height: none;
        min-height: 0;
        border-left: none;
        border-top: 1px solid var(--border-card);
        overflow-x: hidden;
        overflow-y: auto;
      }
      /* Header horizontal (kompakter) */
      .play-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 0.4rem 0.8rem;
        flex-shrink: 0;
      }
      #play-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0.5rem;
      }
      .move-screen  { gap: 0.4rem; }
      .turn-screen  { gap: 0.4rem; }
      .wait-screen  { gap: 0.4rem; }
      .dir-btn      { width: clamp(46px, 12vw, 58px); height: clamp(46px, 12vw, 58px); }
    }

    /* ── Question Modal ───────────────────────────────────────── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: var(--bg-card); border: 2px solid var(--border-card); border-radius: 18px; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-cat-name { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
    .modal-difficulty { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: rgba(227,79,32,0.12); color: var(--accent); }
    .modal-trigger { font-size: 0.9rem; font-weight: 700; padding: 0.4rem 0.8rem; border-radius: 8px; }
    .trigger-door { background: rgba(220,38,38,0.15); color: #dc2626; }
    .trigger-symbol { background: rgba(124,58,237,0.15); color: #7c3aed; }
    .timer-bar-wrap { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .timer-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.95s linear; }
    .timer-text { font-size: 0.8rem; color: var(--text-secondary); text-align: right; }
    .modal-question { font-size: 1.15rem; font-weight: 600; line-height: 1.5; color: var(--text-primary); }
    .answer-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    @media (max-width: 400px) { .answer-options { grid-template-columns: 1fr; } }
    .answer-btn { background: var(--bg-primary); border: 2px solid var(--border-card); border-radius: 10px; padding: 0.75rem 1rem; font-size: 1rem; color: var(--text-primary); cursor: pointer; text-align: left; font-family: inherit; transition: all 0.15s; white-space: normal; word-break: break-word; overflow-wrap: break-word; }
    .answer-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(227,79,32,0.10); }
    .answer-btn.correct { background: rgba(22,163,74,0.2); border-color: #16a34a; }
    .answer-btn.wrong { background: rgba(220,38,38,0.2); border-color: #dc2626; }
    .answer-btn.mc-selected { background: rgba(124,58,237,0.18); border-color: #7c3aed; font-weight: 700; }
    .mc-multi-hint { grid-column: 1 / -1; font-size: 0.82rem; color: var(--text-secondary); font-style: italic; text-align: center; margin-top: 0.1rem; }
    .mc-confirm-btn { grid-column: 1 / -1; background: var(--accent); color: var(--bg-primary); font-weight: 700; border-color: var(--accent); margin-top: 0.3rem; }
    .mc-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-primary); color: var(--text-secondary); border-color: var(--border-card); }
    .open-answer-section { display: flex; flex-direction: column; gap: 0.6rem; }
    .btn-show-answer { background: var(--bg-primary); border: 1px solid var(--border-card); border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.95rem; cursor: pointer; color: var(--text-primary); font-family: inherit; }
    .open-answer-text { background: rgba(22,163,74,0.12); border: 1px solid #16a34a; border-radius: 8px; padding: 0.7rem 1rem; color: #16a34a; font-weight: 600; }
    .open-actions { display: flex; gap: 0.6rem; }
    .btn-correct { flex: 1; background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 0.7rem; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-wrong { flex: 1; background: #dc2626; color: #fff; border: none; border-radius: 8px; padding: 0.7rem; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .modal-result { font-size: 1rem; font-weight: 700; padding: 0.6rem 1rem; border-radius: 8px; }
    .result-correct { background: rgba(22,163,74,0.15); color: #16a34a; }
    .result-wrong { background: rgba(220,38,38,0.15); color: #dc2626; }
    .modal-continue { background: var(--accent); color: var(--bg-primary); border: none; border-radius: 10px; padding: 0.8rem 2rem; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; display: none; }
    .modal-continue:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- ── Join Screen ────────────────────────────────────────── -->
  <div class="play-screen active" id="join-screen">
    <div class="join-logo">🏰</div>
    <div class="join-title">Labyrinth-Quiz</div>
    <div class="join-sub">Gib den Code deiner Lehrkraft ein</div>
    <div class="join-box">
      <input class="join-input" id="join-code" type="text" maxlength="6" placeholder="CODE" autocomplete="off" autocapitalize="characters" onkeydown="if(event.key==='Enter') joinGame()">
      <div class="join-error" id="join-error"></div>
      <div class="join-loading" id="join-loading">Suche Spiel…</div>
      <button class="btn-join" onclick="joinGame()">Beitreten</button>
    </div>
  </div>

  <!-- ── Team Select ────────────────────────────────────────── -->
  <div class="play-screen" id="team-select-screen">
    <div class="ts-title">🏰 Wähle deine Gruppe</div>
    <div class="ts-sub">Jede Gruppe wählt einmal auf einem Gerät</div>
    <div id="team-select-list"></div>
  </div>

  <!-- ── Play Screen ────────────────────────────────────────── -->
  <div class="play-screen" id="play-screen">
    <!-- Links: Labyrinth-Karte -->
    <div class="play-canvas-col">
      <canvas id="maze-canvas"></canvas>
    </div>
    <!-- Rechts: Steuerung -->
    <div class="play-sidebar">
      <div class="play-header">
        <div id="my-team-display">–</div>
        <div id="my-sym-bar"></div>
      </div>
      <div id="play-area">
        <div class="wait-screen">
          <div class="wait-emoji">⏳</div>
          <div class="wait-text">Verbinden…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Question Modal ────────────────────────────────────── -->
  <div class="modal-overlay" id="question-modal">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-cat-name" id="q-cat-name"></span>
        <span class="modal-difficulty" id="q-difficulty"></span>
      </div>
      <div class="modal-trigger" id="q-trigger-type"></div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="q-timer-bar"></div></div>
      <div class="timer-text" id="q-timer-text"></div>
      <div class="modal-question" id="q-text"></div>
      <div class="answer-options" id="q-options"></div>
      <div class="open-answer-section" id="q-open-section" style="display:none;">
        <button class="btn-show-answer" id="q-show-answer" onclick="showOpenAnswer()">Lösung anzeigen</button>
        <div class="open-answer-text" id="q-open-answer"></div>
        <div class="open-actions" id="q-open-actions" style="display:none;">
          <button class="btn-correct" onclick="resolveOpen(true)">✓ Richtig</button>
          <button class="btn-wrong" onclick="resolveOpen(false)">✗ Falsch</button>
        </div>
      </div>
      <div class="modal-result" id="q-result"></div>
      <button class="modal-continue" id="q-continue" onclick="continueAfterQuestion()">Weiter</button>
    </div>
  </div>

  <script src="js/maze.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/play.js"></script>
</body>
</html>
