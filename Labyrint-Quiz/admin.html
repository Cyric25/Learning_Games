<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth-Quiz – Fragen verwalten</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
  <style>
    :root {
      --bg: #fdf6f0; --card: #ffffff; --text: #1a1a1a;
      --accent: #7c3aed; --border: rgba(0,0,0,0.1);
    }
    body.dark {
      --bg: #1a1a2e; --card: #16213e; --text: #f0f0f5;
      --accent: #a78bfa; --border: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      transition: background 0.35s, color 0.35s;
    }
    .card {
      background: var(--card); border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      padding: 2.5rem; width: min(480px, 90vw); text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.8rem; }
    p { color: var(--text); opacity: 0.7; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 0.8rem 2rem; border-radius: 12px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
      transition: opacity 0.2s, transform 0.15s; margin: 0.3rem;
    }
    .btn:hover { opacity: 0.85; transform: scale(1.03); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
    .theme-btn {
      position: fixed; top: 1rem; right: 1rem;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 0.4rem 0.8rem; border-radius: 20px;
      cursor: pointer; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <button class="theme-btn" id="btn-theme" onclick="toggleTheme()">🌙 Darkmode</button>
  <div class="card">
    <h1>🏰 Labyrinth-Quiz</h1>
    <p>
      Das Labyrinth-Quiz nutzt die zentrale Fragendatenbank.<br>
      Fragen und Kategorien werden über die Spielübersicht im Lehrermodus verwaltet.
    </p>
    <a href="../admin.html" class="btn btn-primary">⚙ Fragendatenbank öffnen</a>
    <a href="index.html" class="btn btn-secondary">← Zurück zum Spiel</a>
  </div>
  <script>
    (function () {
      var KEY = 'spiele_theme';
      function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        var el = document.getElementById('btn-theme');
        if (el) el.textContent = dark ? '☀️ Lightmode' : '🌙 Darkmode';
      }
      window.toggleTheme = function () {
        var isDark = !document.body.classList.contains('dark');
        localStorage.setItem(KEY, isDark ? 'dark' : 'light');
        applyTheme(isDark);
      };
      applyTheme(localStorage.getItem(KEY) === 'dark');
    })();
  </script>
</body>
</html>
