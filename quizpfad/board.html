<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizPfad – Tafelansicht</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
  <style>
    :root {
      --bg-body: #f5e6d3;
      --bg-board: #faf0e6;
      --bg-sidebar: #ffffff;
      --bg-field: #fff8f0;
      --text-primary: #3d2b1f;
      --text-secondary: #7a6855;
      --text-light: #a89480;
      --accent: #e76f51;
      --accent-warm: #f4a261;
      --accent-teal: #2a9d8f;
      --border: rgba(61,43,31,0.12);
      --success: #2a9d8f;
      --danger: #e76f51;
      --shadow: 0 4px 20px rgba(61,43,31,0.12);
      --shadow-lg: 0 8px 32px rgba(61,43,31,0.18);
    }
    body.dark {
      --bg-body: #2c1f14;
      --bg-board: #3a2a1c;
      --bg-sidebar: #342318;
      --bg-field: #4a3728;
      --text-primary: #f5e6d3;
      --text-secondary: #c4a882;
      --text-light: #8a7560;
      --border: rgba(245,230,211,0.1);
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); color: var(--text-primary); }

    /* ── Join Screen ── */
    #screen-join { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-body); z-index: 100; }
    .join-card { background: var(--bg-sidebar); border-radius: 20px; padding: 2.5rem; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); border: 1px solid var(--border); text-align: center; }
    .join-title { font-size: 2rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
    .join-sub { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem; }
    .join-input { width: 100%; padding: 14px; font-size: 2rem; font-weight: 800; letter-spacing: 8px; text-align: center; text-transform: uppercase; background: var(--bg-field); border: 2px solid var(--border); border-radius: 14px; color: var(--text-primary); font-family: monospace; outline: none; margin-bottom: 12px; }
    .join-input:focus { border-color: var(--accent); }
    .btn-join { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-warm), var(--accent)); color: #fff; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .btn-join:hover { opacity: .9; }
    .join-error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; min-height: 1.2em; }
    #screen-join.hidden { display: none; }

    /* ── Main Layout ── */
    #screen-board { display: none; flex-direction: row; height: 100vh; }
    #screen-board.active { display: flex; }

    /* Board area (~65%) */
    .board-area {
      flex: 65;
      display: flex;
      flex-direction: column;
      padding: clamp(10px, 1.5vh, 20px);
      background: var(--bg-board);
      min-width: 0;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: var(--bg-sidebar);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .board-code { font-size: 1.2rem; font-weight: 800; color: var(--accent); letter-spacing: 3px; font-family: monospace; }
    .board-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
    .board-round { font-size: 0.9rem; color: var(--text-secondary); }

    .active-team-banner {
      text-align: center;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: clamp(1rem, 2.5vh, 1.4rem);
      font-weight: 800;
      margin-bottom: 10px;
      color: #fff;
      box-shadow: var(--shadow);
      transition: background 0.3s;
    }

    /* Board grid */
    .board-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(3px, 0.6vh, 7px);
      align-content: center;
      min-height: 0;
    }

    .board-field {
      aspect-ratio: 1.2;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--bg-field);
      box-shadow: var(--shadow);
      overflow: visible;
      transition: box-shadow 0.2s;
    }
    .board-field.start-field { background: #2a9d8f; color: #fff; }
    .board-field.goal-field { background: #e76f51; color: #fff; }
    .board-field.cat-field { color: #fff; }
    .board-field.active-land {
      outline: 3px solid #fff;
      outline-offset: -1px;
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
      animation: glow 1.2s ease-in-out infinite;
    }
    @keyframes glow { 0%,100%{box-shadow:0 0 10px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 24px rgba(255,255,255,0.8)} }

    .field-number { font-size: clamp(0.75rem, 1.5vh, 1rem); font-weight: 800; position: absolute; bottom: 2px; right: 5px; color: rgba(255,255,255,0.85); text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    .field-icon { font-size: clamp(1.4rem, 3.5vh, 2.5rem); line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
    .bonus-badge { font-size: clamp(1.4rem, 3.5vh, 2.5rem); line-height: 1; }
    .board-field.bonus-field .field-icon { display: none; }

    /* Path connectors */
    .board-field::after { content: none; position: absolute; background: var(--text-secondary); opacity: 0.5; pointer-events: none; z-index: 0; border-radius: 2px; }
    .board-field.connect-right::after { content: ''; right: 0; top: 50%; width: clamp(5px, 1vh, 10px); height: 4px; transform: translate(100%, -50%); }
    .board-field.connect-left::after { content: ''; left: 0; top: 50%; width: clamp(5px, 1vh, 10px); height: 4px; transform: translate(-100%, -50%); }
    .board-field.connect-down::after { content: ''; bottom: 0; left: 50%; width: 4px; height: clamp(5px, 1vh, 10px); transform: translate(-50%, 100%); }

    /* Team pieces on board */
    .field-pieces { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; justify-items: center; position: absolute; top: 2px; left: 2px; right: 2px; z-index: 2; }
    .piece { width: clamp(12px, 2vh, 22px); height: clamp(12px, 2vh, 22px); border-radius: 50%; border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 1px 4px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: clamp(0.45rem, 1vh, 0.7rem); font-weight: 800; color: #fff; }

    /* ── Right panel (~35%) ── */
    .right-panel {
      flex: 35;
      background: var(--bg-sidebar);
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: clamp(12px, 2vh, 20px);
      overflow-y: auto;
      gap: clamp(10px, 1.5vh, 16px);
    }

    /* Teams list */
    .panel-section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .team-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg-field);
      transition: border-color 0.3s;
      margin-bottom: 6px;
    }
    .team-card.active-turn { border-color: var(--accent); box-shadow: 0 0 12px rgba(231,111,81,0.25); }
    .team-piece { width: clamp(32px,4vh,42px); height: clamp(32px,4vh,42px); border-radius: 50%; border: 3px solid rgba(255,255,255,0.6); box-shadow: 0 2px 6px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: clamp(0.85rem,1.5vh,1.1rem); flex-shrink: 0; }
    .team-info { flex: 1; min-width: 0; }
    .team-name { font-weight: 700; font-size: clamp(0.9rem,1.8vh,1.1rem); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-pos { font-size: clamp(0.7rem,1.4vh,0.85rem); color: var(--text-light); }

    /* Progress bar per team */
    .team-progress-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 4px; overflow: hidden; }
    .team-progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s ease; }

    /* Question card */
    .question-card {
      background: var(--bg-field);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: clamp(14px, 2vh, 20px);
      flex: 1;
    }
    .q-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .q-card-team { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; color: #fff; }
    .q-card-diff { font-size: 0.8rem; padding: 3px 10px; border-radius: 8px; background: var(--bg-sidebar); color: var(--text-light); font-weight: 600; margin-left: auto; }
    .q-card-text { font-size: clamp(1rem, 2.2vh, 1.5rem); font-weight: 700; line-height: 1.4; margin-bottom: 14px; color: var(--text-primary); }
    .q-card-opts { display: flex; flex-direction: column; gap: 7px; }
    .q-card-opt { padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-sidebar); font-size: clamp(0.85rem, 1.7vh, 1rem); color: var(--text-secondary); }
    .q-card-opt.correct { background: rgba(42,157,143,0.15); border-color: var(--success); color: var(--success); font-weight: 700; }
    .q-card-opt.wrong { background: rgba(231,111,81,0.15); border-color: var(--danger); color: var(--danger); }
    .q-card-result { text-align: center; font-size: clamp(1.2rem, 2.5vh, 1.8rem); font-weight: 800; padding: 12px; border-radius: 12px; margin-top: 12px; display: none; }
    .q-card-result.visible { display: block; }
    .q-card-result.ok { background: rgba(42,157,143,0.15); color: var(--success); }
    .q-card-result.bad { background: rgba(231,111,81,0.15); color: var(--danger); }
    .q-card-empty { text-align: center; padding: 2rem; color: var(--text-light); font-size: clamp(0.9rem,1.8vh,1.1rem); font-style: italic; }
    .q-open-label { text-align: center; padding: 1.5rem; color: var(--text-secondary); font-style: italic; font-size: clamp(0.9rem,1.8vh,1.1rem); }

    /* Winner screen */
    #screen-winner { display: none; position: fixed; inset: 0; background: var(--bg-body); align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    #screen-winner.active { display: flex; }
    .winner-trophy { font-size: clamp(4rem,10vh,8rem); animation: trophyBounce 1s ease infinite; }
    @keyframes trophyBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .winner-title { font-size: clamp(2rem,5vw,3.5rem); font-weight: 800; margin: 16px 0 8px; }
    .winner-team { font-size: clamp(1.5rem,3.5vw,2.5rem); font-weight: 700; }
  </style>
</head>
<body>

  <!-- Join Screen -->
  <div id="screen-join">
    <div class="join-card">
      <div class="join-title">📺 Tafelansicht</div>
      <div class="join-sub">QuizPfad – Anzeigemodus für die Tafel<br>Code der Lehrkraft eingeben</div>
      <input type="text" class="join-input" id="join-input" maxlength="4" placeholder="CODE"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
        onkeydown="if(event.key==='Enter')doJoin()">
      <button class="btn-join" onclick="doJoin()">Anzeigen →</button>
      <div class="join-error" id="join-error"></div>
    </div>
  </div>

  <!-- Board Screen -->
  <div id="screen-board">
    <div class="board-area">
      <div class="board-header">
        <div class="board-code" id="board-code"></div>
        <div class="board-title">🎲 QuizPfad</div>
        <div class="board-round" id="board-round">Runde 1</div>
      </div>
      <div class="active-team-banner" id="active-banner"></div>
      <div class="board-grid" id="board-grid"></div>
    </div>

    <div class="right-panel">
      <div>
        <div class="panel-section-title">Teams</div>
        <div id="team-list"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;">
        <div class="panel-section-title">Aktuelle Frage</div>
        <div class="question-card" id="question-card">
          <div class="q-card-empty">Warte auf Frage…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Winner Screen -->
  <div id="screen-winner">
    <div class="winner-trophy">🏆</div>
    <div class="winner-title">Gewonnen!</div>
    <div class="winner-team" id="winner-team"></div>
  </div>

  <script>
  // ─── QpStorage ────────────────────────────────────────────
  const QpStorage = {
    _code: null, _serverOk: null,
    setCode(c) { this._code = c ? c.toUpperCase() : null; },
    getCode()  { return this._code; },
    async checkServer() {
      if (this._serverOk !== null) return this._serverOk;
      if (window.location.protocol === 'file:') { this._serverOk = false; return false; }
      try {
        await fetch('../api.php?f=qp-game&code=PING', {method:'HEAD', signal:AbortSignal.timeout(2000)});
        this._serverOk = true;
      } catch { this._serverOk = false; }
      return this._serverOk;
    },
    _deser(d) { return {...d, usedQuestionIds: new Set(d.usedQuestionIds||[])}; },
    async load(code) {
      code = (code||this._code||'').toUpperCase();
      if (!code) return null;
      if (await this.checkServer())
        try { const r = await fetch('../api.php?f=qp-game&code='+code); if (r.ok) { const d=await r.json(); if(d&&d.meta) return this._deser(d); } } catch {}
      const s = localStorage.getItem('qp_gs_'+code);
      if (s) try { return this._deser(JSON.parse(s)); } catch {}
      return null;
    },
    subscribe(code, cb) {
      code = code.toUpperCase();
      let stopped = false, src = null, timer = null;
      const startSSE = () => {
        if (stopped) return;
        src = new EventSource('../api.php?f=qp-sse&code='+code);
        src.onmessage = e => { if(stopped) return; try { const d=JSON.parse(e.data); if(d&&d.meta) cb(this._deser(d)); } catch {} };
        src.addEventListener('reconnect', () => { src&&src.close(); src=null; if(!stopped) setTimeout(startSSE,500); });
        src.onerror = () => { src&&src.close(); src=null; if(!stopped) startPoll(); };
      };
      const startPoll = () => {
        if(stopped||timer) return;
        const fn = async () => { if(stopped) return; try { const r=await fetch('../api.php?f=qp-game&code='+code); if(r.ok){const d=await r.json();if(d&&d.meta)cb(this._deser(d));} } catch {} };
        fn(); timer = setInterval(fn, 1000);
      };
      const startLocalPoll = () => {
        if(stopped||timer) return; let last='';
        timer = setInterval(() => { if(stopped) return; const s=localStorage.getItem('qp_gs_'+code); if(s&&s!==last){last=s;try{const d=JSON.parse(s);if(d&&d.meta)cb(this._deser(d));}catch{}} }, 500);
      };
      (async () => { if (await this.checkServer()) startSSE(); else startLocalPoll(); })();
      return { unsubscribe() { stopped=true; src&&src.close(); timer&&clearInterval(timer); } };
    }
  };

  const COLS = 6;
  let sub = null;
  let lastLqId = null;

  function doJoin() {
    const inp = document.getElementById('join-input');
    const err = document.getElementById('join-error');
    const code = (inp ? inp.value : '').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    err.textContent = '';
    if (code.length < 4) { err.textContent = 'Bitte 4-stelligen Code eingeben.'; return; }
    connect(code);
  }

  async function connect(code) {
    QpStorage.setCode(code);
    const gs = await QpStorage.load(code);
    if (!gs) { document.getElementById('join-error').textContent = 'Spiel nicht gefunden.'; return; }
    document.getElementById('screen-join').classList.add('hidden');
    applyState(gs);
    if (sub) sub.unsubscribe();
    sub = QpStorage.subscribe(code, applyState);
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function applyState(gs) {
    if (gs.phase === 'finished') {
      const winner = (gs.teams || []).reduce((best, t) => t.position > (best ? best.position : -1) ? t : best, null);
      document.getElementById('winner-team').textContent = winner ? winner.name : '';
      if (winner) document.getElementById('winner-team').style.color = winner.color;
      document.getElementById('screen-board').classList.remove('active');
      document.getElementById('screen-winner').classList.add('active');
      return;
    }

    if (gs.phase !== 'playing' || !gs.board || !gs.board.length) {
      // Setup-Phase: Wartehinweis statt leerer Seite (Join-Screen ist schon zu)
      document.getElementById('screen-board').classList.add('active');
      const banner = document.getElementById('active-banner');
      if (banner) { banner.textContent = '⏳ Warte auf Spielstart…'; banner.style.background = ''; }
      const codeEl = document.getElementById('board-code');
      if (codeEl && gs.meta) codeEl.textContent = gs.meta.gameCode || QpStorage.getCode();
      return;
    }

    document.getElementById('screen-board').classList.add('active');
    renderBoard(gs);
    renderTeams(gs);
    renderQuestion(gs.liveQuestion, gs.teams || []);
  }

  function renderBoard(gs) {
    const fc = gs.fieldCount || gs.board.length;
    const board = gs.board;
    const teams = gs.teams || [];
    const cur = gs.currentTeamIdx || 0;
    const lq = gs.liveQuestion;

    document.getElementById('board-code').textContent = gs.meta.gameCode || QpStorage.getCode();
    document.getElementById('board-round').textContent = 'Runde ' + (gs.round || 1);

    const active = teams[cur];
    const banner = document.getElementById('active-banner');
    if (active) {
      banner.textContent = active.name + ' ist dran!'; // textContent → sicher
      banner.style.background = active.color;
    }

    const grid = document.getElementById('board-grid');
    grid.innerHTML = '';

    for (let row = 0; row < Math.ceil(fc / COLS); row++) {
      const reversed = row % 2 === 1;
      for (let col = 0; col < COLS; col++) {
        const actualCol = reversed ? (COLS - 1 - col) : col;
        const fieldIdx = row * COLS + actualCol;

        if (fieldIdx >= fc) {
          const e = document.createElement('div'); e.style.visibility = 'hidden'; grid.appendChild(e); continue;
        }

        const field = board[fieldIdx];
        const div = document.createElement('div');
        div.className = 'board-field';

        if (field.type === 'start') div.classList.add('start-field');
        if (field.type === 'goal') div.classList.add('goal-field');
        if (field.bonus) div.classList.add('bonus-field');
        if (field.type === 'category') { div.classList.add('cat-field'); div.style.background = field.color; }

        if (fieldIdx < fc - 1) {
          const isEvenRow = row % 2 === 0;
          if (isEvenRow) div.classList.add(col < COLS - 1 ? 'connect-right' : 'connect-down');
          else div.classList.add(col > 0 ? 'connect-left' : 'connect-down');
        }

        if (lq && !lq.resolved) {
          const landField = Math.min(teams[cur] ? teams[cur].position + lq.advanceAmount : -1, fc - 1);
          if (fieldIdx === landField) div.classList.add('active-land');
        }

        const numEl = document.createElement('div');
        numEl.className = 'field-number'; numEl.textContent = fieldIdx; div.appendChild(numEl);

        const BONUS_ICONS = { advance:'⬆️', setback:'⬇️', extra:'🎲', joker:'🃏', duel:'⚔️' };
        if (field.bonus && BONUS_ICONS[field.bonus]) {
          const badge = document.createElement('div'); badge.className = 'bonus-badge'; badge.textContent = BONUS_ICONS[field.bonus]; div.appendChild(badge);
        } else {
          const iconEl = document.createElement('div'); iconEl.className = 'field-icon'; iconEl.textContent = field.icon || ''; div.appendChild(iconEl);
        }

        const piecesDiv = document.createElement('div');
        piecesDiv.className = 'field-pieces';
        teams.forEach((t, ti) => {
          if (t.position === fieldIdx) {
            const p = document.createElement('div');
            p.className = 'piece'; p.style.background = t.color; p.textContent = ti + 1;
            piecesDiv.appendChild(p);
          }
        });
        div.appendChild(piecesDiv);
        grid.appendChild(div);
      }
    }
  }

  function renderTeams(gs) {
    const teams = gs.teams || [];
    const fc = gs.fieldCount || (gs.board ? gs.board.length : 30);
    const cur = gs.currentTeamIdx || 0;
    const list = document.getElementById('team-list');
    list.innerHTML = '';

    teams.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'team-card' + (i === cur ? ' active-turn' : '');
      const progress = fc > 1 ? Math.round(t.position / (fc - 1) * 100) : 0;
      card.innerHTML =
        `<div class="team-piece" style="background:${t.color}">${i+1}</div>` +
        `<div class="team-info">` +
          `<div class="team-name">${esc(t.name)}</div>` +
          `<div class="team-pos">Feld ${t.position}/${fc-1}</div>` +
          `<div class="team-progress-bar"><div class="team-progress-fill" style="width:${progress}%;background:${t.color}"></div></div>` +
        `</div>`;
      list.appendChild(card);
    });
  }

  function renderQuestion(lq, teams) {
    const card = document.getElementById('question-card');

    if (!lq) {
      card.innerHTML = '<div class="q-card-empty">Warte auf Frage…</div>';
      return;
    }

    const q = lq.question;
    const team = teams[lq.teamIdx];

    const advance = lq.advanceAmount;
    const diffStr = (lq.difficulty || q.difficulty || '?') + ' Pkt. · ' + advance + ' Feld' + (advance !== 1 ? 'er' : '') + ' bei ✓';

    let optsHtml = '';
    if (q.typ === 'offen') {
      optsHtml = '<div class="q-open-label">Offene Frage – Lehrkraft wertet aus…</div>';
    } else {
      optsHtml = '<div class="q-card-opts">' +
        (q.antworten || []).map((ans, i) => {
          let cls = 'q-card-opt';
          if (lq.resolved) {
            const correct = Array.isArray(q.correctIndices) && q.correctIndices.length > 0
              ? q.correctIndices : [q.richtig ?? q.correctIndex ?? 0];
            if (correct.includes(i)) cls += ' correct';
            else if (i === lq.selectedMcIndex) cls += ' wrong';
          }
          return `<div class="${cls}">${esc(ans)}</div>`;
        }).join('') +
      '</div>';
    }

    let resultHtml = '';
    if (lq.resolved && lq.correct !== null) {
      const cls = lq.correct ? 'ok' : 'bad';
      const txt = lq.correct ? '✓ Richtig!' : '✗ Falsch!';
      resultHtml = `<div class="q-card-result visible ${cls}">${txt}</div>`;
    }

    card.innerHTML =
      `<div class="q-card-header">` +
        `<span class="q-card-team" style="background:${team ? team.color : '#888'}">${team ? esc(team.name) : ''}</span>` +
        `<span class="q-card-diff">${diffStr}</span>` +
      `</div>` +
      `<div class="q-card-text">${esc(q.frage || '')}</div>` +
      optsHtml +
      resultHtml;
  }

  document.addEventListener('DOMContentLoaded', () => {
    const urlCode = new URLSearchParams(window.location.search).get('code');
    if (urlCode) {
      const inp = document.getElementById('join-input');
      if (inp) inp.value = urlCode.toUpperCase();
      connect(urlCode.toUpperCase());
    }
  });
  </script>

  <!-- Theme Toggle -->
  <script>
  (function () {
    var KEY = 'spiele_theme';
    function applyTheme(dark) { document.body.classList.toggle('dark', dark); }
    applyTheme(localStorage.getItem(KEY) === 'dark');
  })();
  </script>

</body>
</html>
